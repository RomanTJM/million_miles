# Alembic configuration.

[alembic]
# path to migration files
script_location = alembic
scriptPkgEnv = 'alembic'

# template used to generate migration file
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
# prepend_sys_path = .

# timezone to use when rendering the timezone directive
# (defaults to 'utc')
# timezone =

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'upgrade' process
# (defaults to 'false')
# process_revision_directives =

# Location of migration files
file_template = %%(rev)s_%%(slug)s.py

sqlalchemy.url = postgresql+asyncpg://user:password@db:5432/auto_listings

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
