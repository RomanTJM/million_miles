version: '3.8'

services:
  backend:
    environment:
      DEBUG: "false"
      SCRAPER_ENABLED: "true"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always

  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: strong-password-change-this
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups

volumes:
  postgres_data:
    driver: local
